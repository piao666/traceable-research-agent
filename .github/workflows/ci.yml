name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lightweight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OFFLINE_MODE: "true"
      EXTERNAL_TOOLS_DEFAULT_MODE: mock
      GITHUB_TOOL_DEFAULT_MODE: mock
      LLM_PLANNER_ENABLED: "false"
      LLM_PROVIDER: deterministic
      REPORT_GENERATION_MODE: deterministic
      MCP_REMOTE_REGISTRY_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lightweight dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-docker-light.txt

      - name: Compile Python sources
        run: python -m compileall app scripts frontend tests

      - name: Run offline unit contracts
        run: python -m pytest tests

      - name: Run representative smoke checks
        run: |
          python scripts/smoke_planner.py
          python scripts/smoke_planner_guardrails.py
          python scripts/smoke_mcp_server.py
          python scripts/smoke_streamlit_frontend.py
          python scripts/smoke_provenance_v2.py
